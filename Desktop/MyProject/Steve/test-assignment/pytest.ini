[pytest]
DJANGO_SETTINGS_MODULE = beyondcode_cms.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = marketing
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    smoke: Marks tests as smoke tests (fast, critical)
    slow: Marks tests as slow running tests
    integration: Marks tests as integration tests
    unit: Marks tests as unit tests
