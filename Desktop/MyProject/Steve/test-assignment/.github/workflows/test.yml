name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  smoke-tests:
    name: Smoke Tests (Fail Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run smoke tests
      run: |
        python manage.py test_smoke
      env:
        DJANGO_SETTINGS_MODULE: beyondcode_cms.test_settings

    - name: Comment results
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          const status = '${{ job.status }}';
          const comment = `### Smoke Tests: ${status === 'success' ? '✅ PASSED' : '❌ FAILED'}\n\nCritical functionality verified.`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run integration tests
      run: |
        python manage.py test_integration
      env:
        DJANGO_SETTINGS_MODULE: beyondcode_cms.test_settings

  model-tests:
    name: Model & Form Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run model tests
      run: |
        python manage.py test marketing.tests.test_model_comprehensive
        python manage.py test marketing.tests.test_forms
      env:
        DJANGO_SETTINGS_MODULE: beyondcode_cms.test_settings

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [integration-tests, model-tests]
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage

    - name: Run tests with coverage
      run: |
        python manage.py test_coverage
      env:
        DJANGO_SETTINGS_MODULE: beyondcode_cms.test_settings

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/

    - name: Coverage comment
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 80
        MINIMUM_ORANGE: 60

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety

    - name: Run security checks
      run: |
        bandit -r marketing/
        safety check --full-report

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-tests, integration-tests, model-tests, coverage-report]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
        echo "Integration Tests: ${{ needs.integration-tests.result }}"
        echo "Model Tests: ${{ needs.model-tests.result }}"
        echo "Coverage: ${{ needs.coverage-report.result }}"

        if [ "${{ needs.smoke-tests.result }}" != "success" ]; then
          echo "::error::Smoke tests failed!"
          exit 1
        fi

        if [ "${{ needs.integration-tests.result }}" != "success" ]; then
          echo "::error::Integration tests failed!"
          exit 1
        fi

        if [ "${{ needs.model-tests.result }}" != "success" ]; then
          echo "::error::Model tests failed!"
          exit 1
        fi

        echo "All tests passed!"
