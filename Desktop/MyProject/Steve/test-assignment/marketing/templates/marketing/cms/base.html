{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CMS{% endblock %} - BeyondCode AI</title>
    <link rel="icon" type="image/png" href="{% static 'assets/logo-icon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/homepage.css' %}">
    <link rel="stylesheet" href="{% static 'css/cms.css' %}">
    <link rel="stylesheet" href="{% static 'css/cms-editorjs.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-background text-foreground">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="cms-sidebar" id="cms-sidebar">
            <div class="p-6">
                <a href="/" class="flex items-center gap-3">
                    <img src="{% static 'assets/logo-icon.png' %}" alt="BeyondCode AI" class="h-8">
                    <span class="font-bold text-lg tracking-tight">BeyondCode</span>
                </a>
            </div>

            <nav class="px-4 pb-6">
                <div class="mb-6">
                    <p class="px-4 mb-2 text-xs font-semibold text-muted-foreground uppercase tracking-wider">CMS</p>
                    <ul class="space-y-1">
                        <li>
                            <a href="{% url 'cms-dashboard' %}" class="cms-sidebar-link {% if request.resolver_match.url_name == 'cms-dashboard' %}active{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                                Dashboard
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'cms-page-list' %}" class="cms-sidebar-link {% if request.resolver_match.url_name == 'cms-page-list' or request.resolver_match.url_name == 'cms-page-create' or request.resolver_match.url_name == 'cms-page-edit' %}active{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-1.7 1.6 0 2.8 1.8 3 3.4"/><path d="M18.5 12.5c.7-1.7 2-2.9 3.8-3.1 2-.3 3.3 1.8 3 3.7-.4 2.8-3.3 3.9-5.3 3.9"/><path d="M8.5 12c0-2.5 2-4.5 4.5-4.5 1.3 0 2.5.6 3.3 1.5"/><path d="M6.5 17c-.4-2.8.8-4 2.8-4.2 2.8-.3 4-1.8 3.7-3.7-.4-2.8-3.3-3.9-5.3-3.9"/></svg>
                                Pages
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'cms-post-list' %}" class="cms-sidebar-link {% if request.resolver_match.url_name == 'cms-post-list' or request.resolver_match.url_name == 'cms-post-create' or request.resolver_match.url_name == 'cms-post-edit' %}active{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                Blog Posts
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'cms-navigation' %}" class="cms-sidebar-link {% if request.resolver_match.url_name == 'cms-navigation' %}active{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>
                                Navigation
                            </a>
                        </li>
                    </ul>
                </div>

                <div>
                    <p class="px-4 mb-2 text-xs font-semibold text-muted-foreground uppercase tracking-wider">Site</p>
                    <ul class="space-y-1">
                        <li>
                            <a href="/" target="_blank" class="cms-sidebar-link">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><polyline points="10 14 21 3 21 3"/></svg>
                                View Site
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-auto"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><polyline points="10 14 21 3 21 3"/></svg>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <div class="p-6 md:p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- EditorJS CDN - Main library and working plugins only -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.29.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@1.9.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@2.6.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@2.3.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@2.9.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/warning@1.4.0"></script>

    <!-- Custom Inline Button Tool -->
    <script src="{% static 'js/editorjs-button-tool.js' %}"></script>

    <!-- Cloudinary Widget -->
    <script>
        (function() {
            // Cloudinary upload widget - basic implementation
            window.cmsUploadImage = function(input, folder) {
                folder = folder || 'cms';
                const file = input.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('file', file);
                formData.append('folder', folder);

                fetch('/cms/upload/', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('Upload failed: ' + data.error);
                    } else {
                        // Trigger custom event
                        input.dispatchEvent(new CustomEvent('cms-upload-complete', {
                            detail: { url: data.url }
                        }));
                    }
                })
                .catch(error => {
                    alert('Upload failed: ' + error.message);
                });
            };

            // Attach upload widgets
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('.cms-cloudinary-upload').forEach(widget => {
                    const input = widget.querySelector('input[type="file"]');
                    const preview = widget.querySelector('.cms-upload-preview');
                    const hidden = widget.querySelector('input[type="hidden"]');

                    if (input && preview && hidden) {
                        input.addEventListener('change', function() {
                            const file = this.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = function(e) {
                                    preview.src = e.target.result;
                                    preview.style.display = 'block';
                                };
                                reader.readAsDataURL(file);

                                // Upload to Cloudinary
                                window.cmsUploadImage(this, widget.dataset.folder || 'cms');
                            }
                        });

                        // Listen for upload completion
                        input.addEventListener('cms-upload-complete', function(e) {
                            hidden.value = e.detail.url;
                        });
                    }
                });
            });
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
